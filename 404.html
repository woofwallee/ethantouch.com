<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Ethan Touch</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #E6E8E7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-page { max-width: 500px; }
    @font-face {
      font-family: 'Picasso';
      src: url('fonts/Picasso.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    .error-page h1 {
      font-family: 'Picasso', 'Playfair Display', serif;
      font-size: 4rem;
      color: #B7C9C3;
      margin-bottom: 1rem;
    }
    .error-page p {
      font-size: 1rem;
      opacity: 0.5;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .error-page a {
      display: inline-block;
      padding: 0.85rem 2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #FAE1C5;
      color: #0a0a0a;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .error-page a:hover {
      background: #f5d1aa;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <h1>404</h1>
    <p>This page doesn't exist. It may have been moved or you followed a broken link.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
