<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <meta name="theme-color" content="#FFFFFF">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ page.image | default: '/images/og-image.png' }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="{% if page.layout == 'journal-post' %}article{% else %}website{% endif %}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ page.image | default: '/images/og-image.png' }}">

  {% if page.layout == 'journal-post' %}
  <!-- Article schema (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | jsonify }},
    {% if page.image %}"image": "{{ site.url }}{{ page.image }}",
    {% endif %}"datePublished": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "Ethan Touch",
      "url": "{{ site.url }}/"
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ site.url }}{{ page.url }}"
    }
  }
  </script>
  {% endif %}

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.url }}/journal/feed.xml">

  <!-- Google Analytics (matches main site tag) -->
  <script>
  // Owner opt-out: skip GA when the flag is set in localStorage
  // or when ?et_no_track=1 is present in the URL.
  (function () {
    try {
      var p = new URLSearchParams(location.search);
      if (p.get('et_no_track') === '1') localStorage.setItem('et_disable_ga', '1');
      if (localStorage.getItem('et_disable_ga') === '1') {
        window['ga-disable-G-3FWR3RM6KP'] = true;
      }
    } catch (e) {}
  })();
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3FWR3RM6KP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3FWR3RM6KP', {
      content_group: '{% if page.layout == "journal-post" %}Journal Post{% else %}Journal Index{% endif %}'
    });
  </script>

  <!-- Roboto Mono (variable, italic + roman) — journal-only typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

  <!-- Lenis smooth scroll -->
  <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js" defer></script>

  <!-- Journal styles -->
  <link rel="stylesheet" href="/journal/style.css?v=3">

  {% seo %}
</head>
<body class="journal">

  <div class="journal-cursor" aria-hidden="true"></div>

  {{ content }}

  <script src="/journal/script.js?v=3" defer></script>
</body>
</html>
