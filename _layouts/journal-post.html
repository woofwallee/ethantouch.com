---
layout: journal-base
---

<a href="/journal/" class="journal-back" aria-label="Back to journal">
  <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
    <path d="M11 14L6 9L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span>Journal</span>
</a>

<article class="journal-post">

  {% if page.image %}
  <div class="journal-post__hero" data-parallax>
    <img src="{{ page.image }}" alt="{{ page.image_alt | default: page.title }}" loading="eager">
  </div>
  {% endif %}

  <header class="journal-post__header">
    <div class="journal-post__meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      <span class="journal-post__sep">·</span>
      <span class="journal-post__readtime">{{ content | number_of_words | divided_by: 200 | plus: 1 }} min read</span>
    </div>
    <h1 class="journal-post__title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="journal-post__subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>

  <div class="journal-post__body">
    {{ content }}
  </div>

  <footer class="journal-post__footer">
    <a href="/journal/" class="journal-post__back-link">Back to the journal</a>
  </footer>

</article>
