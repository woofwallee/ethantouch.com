<!DOCTYPE html>
<html>
<head>
<title>CS1 Animation Preview</title>
<script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
</head>
<body style="margin:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem;padding:2rem;">
<div style="color:#8a8f98;font-family:sans-serif;font-size:13px;">LOTTIE ANIMATION</div>
<div style="background:#141414;border-radius:12px;width:600px;height:400px;display:flex;align-items:center;justify-content:center;">
<lottie-player id="lp" src="images/lottie-upstream.json?v=20260403b" background="transparent" speed="1" loop autoplay style="width:100%;height:100%;"></lottie-player>
<script>
document.getElementById('lp').addEventListener('ready', function() {
  this.seek('60%');
  this.pause();
});
</script>
</div>

  <rect x="396" y="292" width="75" height="6" rx="3" fill="#D7DDC9" opacity="0.2"/>
  <rect x="396" y="304" width="55" height="6" rx="3" fill="#D7DDC9" opacity="0.12"/>

</svg>
</div>
</body>
</html>
